# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=1024']
      - id: check-merge-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: https://github.com/psf/black
    rev: 24.2.0
    hooks:
      - id: black
        language_version: python3
        args: [--line-length=88]

  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: [--profile=black, --line-length=88]

  - repo: https://github.com/PyCQA/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        args: [
          --max-line-length=88,
          --extend-ignore=E203,W503,
          --exclude=ai-env/*,dev-env/*,__pycache__/*,.*
        ]
        additional_dependencies: [
          'flake8-docstrings==1.7.0',
          'flake8-bugbear==24.2.6',
        ]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        args: [--ignore-missing-imports, --follow-imports=skip]
        exclude: ^(ai-env/|dev-env/|tests/|.*\b(cloning|streaming|finetuning)\.py$)

  - repo: https://github.com/asottile/pyupgrade
    rev: v3.15.0
    hooks:
      - id: pyupgrade
        args: [--py310-plus]

  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.7
    hooks:
      - id: bandit
        args: [-c, pyproject.toml]
        additional_dependencies: ["bandit[toml]"]
        exclude: ^tests/

  - repo: https://github.com/python-poetry/poetry
    rev: 1.7.0
    hooks:
      - id: poetry-check
      - id: poetry-lock
        stages: [manual]

  - repo: local
    hooks:
      - id: pylint
        name: pylint
        entry: pylint
        language: system
        types: [python]
        args: [
          "-rn", # Only display messages
          "-sn", # Don't display the score
          "--fail-under=8.0",
          "--ignored-modules=torch,numpy,librosa,neucodec,neutts",
        ]
        exclude: ^(ai-env/|dev-env/|__pycache__/)

      - id: safety
        name: safety
        entry: safety
        language: system
        args: [check, --full-report]
        files: requirements\.txt$
        stages: [manual]

      - id: pytest
        name: pytest
        entry: pytest
        language: system
        args: [-v, tests/]
        pass_filenames: false
        stages: [manual]

      - id: check-requirements
        name: Check requirements
        entry: python -c "import sys; import pkg_resources; requirements = [line.strip() for line in open('requirements.txt') if line.strip() and not line.startswith('#')]; pkg_resources.require(requirements); print('✓ All requirements satisfied')"
        language: system
        files: requirements\.txt$
        stages: [push]